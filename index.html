<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Synchronized Multiplayer FPS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; background-color: #05050a; }
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(10,10,15,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; z-index: 10; cursor: pointer; }
        #instructions { background: #151520; padding: 30px; border-radius: 8px; border: 2px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); max-width: 400px; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffcc; }
        #crosshair::before { top: 7px; left: -2px; width: 20px; height: 2px; }
        #crosshair::after { top: -2px; left: 7px; width: 2px; height: 20px; }
        #hud { position: absolute; top: 20px; right: 20px; width: 240px; pointer-events: none; z-index: 5; background: rgba(10, 10, 15, 0.9); padding: 12px; border: 2px solid #00ffcc; border-radius: 6px; color: white; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <b style="font-size:26px; color:#00ffcc;">WARZONE V5.0</b><br/><br/>
            Click anywhere to lock cursor & drop in.<br/><br/>
            Move: <b>W, A, S, D</b><br/>
            Jump: <b>SPACEBAR</b><br/>
            Shoot Bullets: <b>LEFT CLICK MOUSE</b><br/>
            Aim: <b>Move Mouse Naturally</b>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="hud">
        <div style="color: #00ffcc; font-weight: bold; font-size: 18px;">MULTIPLAYER ACTIVE</div>
        <div style="font-size: 12px; color: #aaa;">Press ESC to unlock cursor</div>
    </div>

    <script>
        let camera, scene, renderer, blocker;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let prevTime = performance.now();
        
        const velocity = new THREE.Vector3();
        let controlsLocked = false;
        let pitch = 0, yaw = 0;

        const ARENA_SIZE = 80; 
        const PLAYER_RADIUS = 1.2;
        const bullets = [], wallMeshes = [];
        let weaponGroup;

        // Networking
        let socket;
        let remotePlayers = {}; 
        
        // Weapon attributes
        let fireRate = 150; // ms between shots
        let lastShotTime = 0;

        init();
        animate();

        function init() {
            blocker = document.getElementById('blocker');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05050a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2.5, ARENA_SIZE / 2 - 5);

            weaponGroup = new THREE.Group();
            camera.add(weaponGroup);
            scene.add(camera);
            buildWeaponMesh();

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // Floor arena map
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(ARENA_SIZE, ARENA_SIZE), new THREE.MeshStandardMaterial({ color: 0x111116 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            const grid = new THREE.GridHelper(ARENA_SIZE, ARENA_SIZE / 2, 0x00ffcc, 0x222233);
            grid.position.y = 0.01;
            scene.add(grid);

            // Bounds
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x1c1c24 });
            const nW = new THREE.Mesh(new THREE.BoxGeometry(ARENA_SIZE, 8, 1), wallMat); nW.position.set(0, 4, -ARENA_SIZE/2); scene.add(nW); wallMeshes.push(nW);
            const sW = new THREE.Mesh(new THREE.BoxGeometry(ARENA_SIZE, 8, 1), wallMat); sW.position.set(0, 4, ARENA_SIZE/2); scene.add(sW); wallMeshes.push(sW);
            const eW = new THREE.Mesh(new THREE.BoxGeometry(1, 8, ARENA_SIZE), wallMat); eW.position.set(ARENA_SIZE/2, 4, 0); scene.add(eW); wallMeshes.push(eW);
            const wW = new THREE.Mesh(new THREE.BoxGeometry(1, 8, ARENA_SIZE), wallMat); wW.position.set(-ARENA_SIZE/2, 4, 0); scene.add(wW); wallMeshes.push(wW);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // --- NETWORKING SETUPS ---
            // REPLACE THIS VALUE WITH YOUR ACTUAL DEPLOYED RENDER BACKEND LINK
            socket = io("YOUR_RENDER_SERVER_URL_HERE"); 

            socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach((id) => {
                    if (id !== socket.id) createRemotePlayerMesh(id, players[id]);
                });
            });

            socket.on('newPlayer', (playerInfo) => {
                createRemotePlayerMesh(playerInfo.id, playerInfo);
            });

            socket.on('playerMoved', (playerInfo) => {
                if (remotePlayers[playerInfo.id]) {
                    remotePlayers[playerInfo.id].position.set(playerInfo.x, playerInfo.y, playerInfo.z);
                    remotePlayers[playerInfo.id].rotation.y = playerInfo.yaw;
                }
            });

            socket.on('playerDisconnected', (id) => {
                if (remotePlayers[id]) {
                    scene.remove(remotePlayers[id]);
                    delete remotePlayers[id];
                }
            });

            // Listen for bullets fired by your friend
            socket.on('remoteBulletFired', (bulletData) => {
                spawnBulletMesh(bulletData.origin, bulletData.direction, bulletData.velocity, 0xff0055);
            });

            // Input Triggers
            blocker.addEventListener('click', () => { document.body.requestPointerLock(); });
            document.addEventListener('pointerlockchange', () => {
                controlsLocked = (document.pointerLockElement === document.body);
                blocker.style.display = controlsLocked ? 'none' : 'flex';
            });

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseDown);
            window.addEventListener('resize', onWindowResize);
        }

        function createRemotePlayerMesh(id, info) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 3.2, 1.6), new THREE.MeshStandardMaterial({ color: 0xcc00ff }));
            body.position.y = 1.6; // Align to stand accurately on floor
            group.add(body);

            const visor = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.4), new THREE.MeshBasicMaterial({ color: 0x00ffcc }));
            visor.position.set(0, 2.6, -0.7);
            group.add(visor);

            group.position.set(info.x, info.y - 2.5, info.z); // offset camera height eye lines
            scene.add(group);
            remotePlayers[id] = group;
        }

        function buildWeaponMesh() {
            const matMetal = new THREE.MeshStandardMaterial({ color: 0x222, metalness: 0.8 });
            const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, 0.25), matMetal); receiver.position.set(0.15, -0.2, -0.3); weaponGroup.add(receiver);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.35), matMetal); barrel.rotation.x = Math.PI/2; barrel.position.set(0.15, -0.19, -0.55); weaponGroup.add(barrel);
        }

        function onMouseMove(event) {
            if (!controlsLocked) return;
            yaw -= (event.movementX || 0) * 0.0022;
            pitch -= (event.movementY || 0) * 0.0022;
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
        }

        function onMouseDown(event) {
            if (!controlsLocked || event.button !== 0) return;
            
            const now = performance.now();
            if (now - lastShotTime < fireRate) return;
            lastShotTime = now;

            // Generate direction vector based on player look angle
            const camDirection = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            const bulletVelocity = 110; 
            
            // Define starting point slightly ahead of player camera
            const originPoint = camera.position.clone().addScaledVector(camDirection, 0.5);

            // Spawn local bullet element
            spawnBulletMesh(originPoint, camDirection, bulletVelocity, 0x00ffcc);

            // Send shot events straight out to server sockets
            if (socket && socket.connected) {
                socket.emit('shootBullet', {
                    origin: { x: originPoint.x, y: originPoint.y, z: originPoint.z },
                    direction: { x: camDirection.x, y: camDirection.y, z: camDirection.z },
                    velocity: bulletVelocity
                });
            }
        }

        function spawnBulletMesh(origin, direction, speed, colorHex) {
            const bMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshBasicMaterial({ color: colorHex }));
            bMesh.position.set(origin.x, origin.y, origin.z);
            scene.add(bMesh);

            bullets.push({
                mesh: bMesh,
                velocity: new THREE.Vector3(direction.x, direction.y, direction.z).multiplyScalar(speed),
                aliveTime: 0
            });
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': 
                    if (canJump) velocity.y += 13.5; // Upward impulse force
                    canJump = false;
                    break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controlsLocked) {
                // Movement damping
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                
                // Gravity acceleration engine
                velocity.y -= 9.81 * 3.8 * delta; 

                const lookEuler = new THREE.Euler(0, yaw, 0, 'YXZ');
                const forwardDirection = new THREE.Vector3(0, 0, -1).applyEuler(lookEuler);
                const rightDirection = new THREE.Vector3(1, 0, 0).applyEuler(lookEuler);

                if (moveForward) velocity.addScaledVector(forwardDirection, 140.0 * delta);
                if (moveBackward) velocity.addScaledVector(forwardDirection, -140.0 * delta);
                if (moveLeft) velocity.addScaledVector(rightDirection, -140.0 * delta);
                if (moveRight) velocity.addScaledVector(rightDirection, 140.0 * delta);

                const oldPosition = camera.position.clone();
                camera.position.addScaledVector(velocity, delta);

                // Map Barrier Collisions
                for (let m = 0; m < wallMeshes.length; m++) {
                    const wallBox = new THREE.Box3().setFromObject(wallMeshes[m]);
                    const playerBox = new THREE.Box3(
                        new THREE.Vector3(camera.position.x - PLAYER_RADIUS, 0, camera.position.z - PLAYER_RADIUS),
                        new THREE.Vector3(camera.position.x + PLAYER_RADIUS, 8, camera.position.z + PLAYER_RADIUS)
                    );
                    if (wallBox.intersectsBox(playerBox)) {
                        camera.position.x = oldPosition.x;
                        camera.position.z = oldPosition.z;
                        break;
                    }
                }

                // Landing check physics logic 
                if (camera.position.y < 2.5) {
                    velocity.y = 0;
                    camera.position.y = 2.5;
                    canJump = true;
                }

                // Broadcast local coordinates to backend
                if (socket && socket.connected) {
                    socket.emit('playerMovement', {
                        x: camera.position.x,
                        y: camera.position.y,
                        z: camera.position.z,
                        yaw: yaw
                    });
                }
            }

            // Bullet flight mechanics tracking loop
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.velocity, delta);
                b.aliveTime += delta;

                // Strip out old bullets or ground collisions after 3 seconds
                if (b.aliveTime > 3.0 || b.mesh.position.y <= 0) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
